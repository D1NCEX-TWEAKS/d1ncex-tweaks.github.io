<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>D1NCEX TWEAKS — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --blue: #1a6fff;
      --blue-bright: #00aaff;
      --black: #020408;
      --text-dim: #4a6a9a;
      --white: #e8f2ff;
      --glow: 0 0 10px #1a6fff, 0 0 30px #1a6fff66, 0 0 60px #1a6fff22;
    }
    body {
      background: var(--black);
      font-family: 'Orbitron', monospace;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; overflow: hidden; cursor: none;
    }

    /* CURSOR */
    .cursor {
      position: fixed; width: 10px; height: 10px;
      background: var(--blue-bright); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%); box-shadow: var(--glow);
    }
    .cursor-ring {
      position: fixed; width: 32px; height: 32px;
      border: 1px solid rgba(26,111,255,0.6); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%,-50%);
      transition: width 0.2s, height 0.2s;
    }
    .cursor-ring.hover { width: 48px; height: 48px; }

    /* BACKGROUND */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(26,111,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,111,255,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
    }
    .bg-scan {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
    }
    .bg-beam {
      position: fixed; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(26,111,255,0.4), transparent);
      z-index: 0; pointer-events: none; animation: beamMove 6s linear infinite;
    }
    @keyframes beamMove { 0%{top:-2px;} 100%{top:100vh;} }
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(100px); pointer-events: none; z-index: 0;
      animation: orbPulse 8s ease-in-out infinite;
    }
    .orb1 { width: 500px; height: 500px; background: rgba(26,111,255,0.07); top:-150px; left:-150px; }
    .orb2 { width: 400px; height: 400px; background: rgba(0,80,200,0.06); bottom:-100px; right:-100px; animation-delay:-4s; }
    @keyframes orbPulse { 0%,100%{opacity:0.8;} 50%{opacity:1;} }

    /* CONTENT */
    .content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; gap: 28px; padding: 24px;
      animation: fadeUp 0.8s ease both;
    }

    .logo {
      font-size: 0.95rem; font-weight: 900; letter-spacing: 6px; color: var(--white);
    }
    .logo span { color: var(--blue-bright); text-shadow: var(--glow); }

    .divider-line {
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
    }

    .coming-soon {
      font-size: clamp(2.5rem, 10vw, 6rem);
      font-weight: 900; letter-spacing: 4px; color: var(--white); line-height: 1;
    }
    .coming-soon::after {
      content: ''; display: block; height: 3px; margin-top: 10px;
      background: linear-gradient(90deg, transparent, var(--blue-bright), transparent);
      animation: scanLine 3s ease-in-out infinite;
    }
    @keyframes scanLine { 0%,100%{opacity:0.4;transform:scaleX(0.5);} 50%{opacity:1;transform:scaleX(1);} }

    .sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase;
    }
    .dots span {
      display: inline-block; animation: dotBounce 1.4s ease-in-out infinite;
      color: var(--blue-bright); text-shadow: var(--glow);
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce { 0%,80%,100%{opacity:0.2;} 40%{opacity:1;} }

    /* WHAT'S COMING */
    .section-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.58rem; letter-spacing: 4px;
      color: var(--text-dim); text-transform: uppercase;
      display: flex; align-items: center; gap: 10px;
    }
    .section-label::before, .section-label::after {
      content: ''; width: 30px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(26,111,255,0.4));
    }
    .section-label::after { background: linear-gradient(90deg, rgba(26,111,255,0.4), transparent); }

    .features-preview {
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
      max-width: 500px;
    }
    .fp-item {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-dim);
      border: 1px solid rgba(26,111,255,0.15);
      padding: 9px 16px; position: relative; overflow: hidden;
      transition: all 0.3s;
    }
    .fp-item::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 2px; background: var(--blue); box-shadow: 0 0 6px var(--blue);
    }
    .fp-item:hover {
      border-color: rgba(26,111,255,0.5);
      color: var(--blue-bright);
      background: rgba(26,111,255,0.06);
      transform: translateY(-2px);
    }

    /* TIKTOK */
    .tiktok-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .tiktok-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem; letter-spacing: 3px;
      color: var(--text-dim); text-transform: uppercase;
    }
    .tiktok-link {
      font-family: 'Orbitron', monospace;
      font-size: 0.82rem; font-weight: 700; letter-spacing: 3px;
      color: var(--blue-bright); text-decoration: none;
      text-shadow: var(--glow);
      border: 1px solid rgba(26,111,255,0.3);
      padding: 12px 28px;
      transition: all 0.25s; cursor: none;
      position: relative; overflow: hidden;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .tiktok-link::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(26,111,255,0.12), transparent);
      transition: left 0.4s;
    }
    .tiktok-link:hover::before { left: 100%; }
    .tiktok-link:hover {
      border-color: rgba(26,111,255,0.7);
      box-shadow: 0 0 20px rgba(26,111,255,0.2);
      transform: translateY(-2px);
    }
    .tiktok-icon { font-size: 1rem; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }

    footer {
      position: fixed; bottom: 24px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem; letter-spacing: 3px;
      color: rgba(74,106,154,0.35); z-index: 2;
    }

    @media (max-width: 480px) {
      .features-preview { gap: 8px; }
      .fp-item { font-size: 0.52rem; padding: 8px 12px; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="bg-grid"></div>
  <div class="bg-scan"></div>
  <div class="bg-beam"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="content">

    <div class="logo">D1NCEX <span>TWEAKS</span></div>

    <div class="divider-line"></div>

    <div class="coming-soon">COMING SOON</div>

    <div class="sub">
      Windows Performance Optimization
      <span class="dots"><span>.</span><span>.</span><span>.</span></span>
    </div>

    <div class="section-label">What's coming</div>

    <div class="features-preview">
      <div class="fp-item">⚡ FPS Boost</div>
      <div class="fp-item">🎯 Input Optimization</div>
      <div class="fp-item">📡 Network Tweaks</div>
      <div class="fp-item">🧹 Background Cleanup</div>
      <div class="fp-item">🖥️ Win 10 &amp; 11</div>
      <div class="fp-item">💰 Only €5</div>
    </div>

    <div class="tiktok-wrap">
      <div class="tiktok-label">Follow for updates</div>
      <a href="https://tiktok.com/@d1ncex_" class="tiktok-link" target="_blank">
        <span class="tiktok-icon">♪</span> @d1ncex_
      </a>
    </div>

  </div>

  <footer>© 2026 D1NCEX TWEAKS — ALL RIGHTS RESERVED</footer>

  <script>
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
    });
    (function animRing() {
      rx += (mx - rx) * 0.1; ry += (my - ry) * 0.1;
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      requestAnimationFrame(animRing);
    })();
    document.querySelectorAll('a, .fp-item').forEach(el => {
      el.addEventListener('mouseenter', () => ring.classList.add('hover'));
      el.addEventListener('mouseleave', () => ring.classList.remove('hover'));
    });
  </script>
</body>
</html>

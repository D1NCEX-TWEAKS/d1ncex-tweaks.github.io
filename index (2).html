<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>D1NCEX TWEAKS — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --blue: #1a6fff;
      --blue-bright: #00aaff;
      --black: #020408;
      --text-dim: #4a6a9a;
      --white: #e8f2ff;
      --red: #ff2020;
      --red-dim: #ff202066;
      --glow: 0 0 10px #1a6fff, 0 0 30px #1a6fff66, 0 0 60px #1a6fff22;
      --glow-red: 0 0 10px #ff2020, 0 0 30px #ff202066, 0 0 60px #ff202022;
    }
    body {
      background: var(--black);
      font-family: 'Orbitron', monospace;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; overflow: hidden; cursor: none;
    }

    /* CURSOR */
    .cursor {
      position: fixed; width: 10px; height: 10px;
      background: var(--blue-bright); border-radius: 50%;
      pointer-events: none; z-index: 9999;
      transform: translate(-50%,-50%); box-shadow: var(--glow);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .cursor.red { background: var(--red); box-shadow: var(--glow-red); }
    .cursor-ring {
      position: fixed; width: 32px; height: 32px;
      border: 1px solid rgba(26,111,255,0.6); border-radius: 50%;
      pointer-events: none; z-index: 9998;
      transform: translate(-50%,-50%);
      transition: width 0.2s, height 0.2s, border-color 0.2s;
    }
    .cursor-ring.hover { width: 48px; height: 48px; }
    .cursor-ring.red { border-color: rgba(255,32,32,0.6); }

    /* BACKGROUND */
    .bg-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(26,111,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(26,111,255,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 30%, transparent 100%);
    }
    .bg-scan {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
    }
    .bg-beam {
      position: fixed; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(26,111,255,0.4), transparent);
      z-index: 0; pointer-events: none; animation: beamMove 6s linear infinite;
    }
    @keyframes beamMove { 0%{top:-2px;} 100%{top:100vh;} }
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(100px); pointer-events: none; z-index: 0;
      animation: orbPulse 8s ease-in-out infinite;
    }
    .orb1 { width: 500px; height: 500px; background: rgba(26,111,255,0.07); top:-150px; left:-150px; }
    .orb2 { width: 400px; height: 400px; background: rgba(0,80,200,0.06); bottom:-100px; right:-100px; animation-delay:-4s; }
    .orb3 { width: 300px; height: 300px; background: rgba(255,32,32,0.04); bottom:30%; right:-80px; animation-delay:-2s; }
    @keyframes orbPulse { 0%,100%{opacity:0.8;} 50%{opacity:1;} }

    /* GLITCH */
    @keyframes glitch {
      0%   { text-shadow: var(--glow); clip-path: none; transform: none; }
      2%   { text-shadow: -3px 0 var(--red), 3px 0 var(--blue-bright); clip-path: polygon(0 10%, 100% 10%, 100% 30%, 0 30%); transform: translate(-2px,0); }
      4%   { text-shadow: var(--glow); clip-path: none; transform: none; }
      6%   { text-shadow: 3px 0 var(--red), -3px 0 var(--blue-bright); clip-path: polygon(0 55%, 100% 55%, 100% 75%, 0 75%); transform: translate(2px,0); }
      8%   { text-shadow: var(--glow); clip-path: none; transform: none; }
      100% { text-shadow: var(--glow); clip-path: none; transform: none; }
    }

    /* CONTENT */
    .content {
      position: relative; z-index: 2;
      display: flex; flex-direction: column;
      align-items: center; gap: 28px; padding: 24px;
      animation: fadeUp 0.8s ease both;
    }

    .logo {
      font-size: 0.95rem; font-weight: 900; letter-spacing: 6px; color: var(--white);
    }
    .logo span { color: var(--blue-bright); text-shadow: var(--glow); }

    .divider-line {
      width: 80px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--blue), transparent);
    }

    .coming-soon {
      font-size: clamp(2.5rem, 10vw, 6rem);
      font-weight: 900; letter-spacing: 4px; color: var(--white); line-height: 1;
      text-shadow: var(--glow);
      animation: glitch 5s steps(1) infinite;
    }
    .coming-soon::after {
      content: ''; display: block; height: 3px; margin-top: 10px;
      background: linear-gradient(90deg, transparent, var(--blue-bright), transparent);
      animation: scanLine 3s ease-in-out infinite;
    }
    @keyframes scanLine { 0%,100%{opacity:0.4;transform:scaleX(0.5);} 50%{opacity:1;transform:scaleX(1);} }

    .sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase;
    }
    .dots span {
      display: inline-block; animation: dotBounce 1.4s ease-in-out infinite;
      color: var(--blue-bright); text-shadow: var(--glow);
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; }
    .dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotBounce { 0%,80%,100%{opacity:0.2;} 40%{opacity:1;} }

    /* WHAT'S COMING */
    .section-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.58rem; letter-spacing: 4px;
      color: var(--text-dim); text-transform: uppercase;
      display: flex; align-items: center; gap: 10px;
    }
    .section-label::before, .section-label::after {
      content: ''; width: 30px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(26,111,255,0.4));
    }
    .section-label::after { background: linear-gradient(90deg, rgba(26,111,255,0.4), transparent); }

    .features-preview {
      display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
      max-width: 500px;
    }
    .fp-item {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.58rem; letter-spacing: 2px; text-transform: uppercase;
      color: var(--text-dim);
      border: 1px solid rgba(26,111,255,0.15);
      padding: 9px 16px; position: relative; overflow: hidden;
      transition: all 0.3s;
    }
    .fp-item::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 2px; background: var(--blue); box-shadow: 0 0 6px var(--blue);
    }
    .fp-item:hover {
      border-color: rgba(26,111,255,0.5);
      color: var(--blue-bright);
      background: rgba(26,111,255,0.06);
      transform: translateY(-2px);
    }

    /* YOUTUBE */
    .yt-wrap {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .yt-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem; letter-spacing: 3px;
      color: var(--text-dim); text-transform: uppercase;
    }
    .yt-link {
      font-family: 'Orbitron', monospace;
      font-size: 0.82rem; font-weight: 700; letter-spacing: 3px;
      color: var(--white); text-decoration: none;
      border: 1px solid rgba(255,32,32,0.35);
      padding: 14px 32px;
      transition: all 0.25s; cursor: none;
      position: relative; overflow: hidden;
      display: inline-flex; align-items: center; gap: 12px;
    }
    .yt-link::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,32,32,0.1), transparent);
      transition: left 0.4s;
    }
    .yt-link:hover::before { left: 100%; }
    .yt-link:hover {
      border-color: rgba(255,32,32,0.8);
      box-shadow: 0 0 24px rgba(255,32,32,0.25), inset 0 0 20px rgba(255,32,32,0.04);
      color: #fff;
      transform: translateY(-2px);
    }
    .yt-link:hover .yt-icon-wrap { box-shadow: 0 0 14px rgba(255,32,32,0.8); }

    /* YT play button icon */
    .yt-icon-wrap {
      width: 28px; height: 20px; background: var(--red);
      border-radius: 5px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 8px rgba(255,32,32,0.5);
      transition: box-shadow 0.25s;
      flex-shrink: 0;
    }
    .yt-icon-wrap svg { width: 10px; height: 10px; fill: #fff; }

    /* SUB COUNT badge */
    .yt-stats {
      display: flex; gap: 16px; align-items: center;
      margin-top: 2px;
    }
    .yt-stat {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.5rem; letter-spacing: 2px; text-transform: uppercase;
      color: rgba(74,106,154,0.5);
      display: flex; align-items: center; gap: 5px;
    }
    .yt-stat .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--red); opacity: 0.6; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:1;} }

    @keyframes fadeUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }

    footer {
      position: fixed; bottom: 24px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.55rem; letter-spacing: 3px;
      color: rgba(74,106,154,0.35); z-index: 2;
    }

    @media (max-width: 480px) {
      .features-preview { gap: 8px; }
      .fp-item { font-size: 0.52rem; padding: 8px 12px; }
      .yt-link { font-size: 0.72rem; padding: 12px 22px; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursorRing"></div>

  <div class="bg-grid"></div>
  <div class="bg-scan"></div>
  <div class="bg-beam"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="content">

    <div class="logo">D1NCEX <span>TWEAKS</span></div>

    <div class="divider-line"></div>

    <div class="coming-soon">COMING SOON</div>

    <div class="sub">
      Windows Performance Optimization
      <span class="dots"><span>.</span><span>.</span><span>.</span></span>
    </div>

    <div class="section-label">What's coming</div>

    <div class="features-preview">
      <div class="fp-item">⚡ FPS Boost</div>
      <div class="fp-item">🎯 Input Optimization</div>
      <div class="fp-item">📡 Network Tweaks</div>
      <div class="fp-item">🧹 Background Cleanup</div>
      <div class="fp-item">🖥️ Win 10 &amp; 11</div>
      <div class="fp-item">💰 Only €5</div>
    </div>

    <div class="yt-wrap">
      <div class="yt-label">Subscribe for updates</div>
      <a href="https://youtube.com/@d1ncex" class="yt-link" target="_blank" id="ytLink">
        <span class="yt-icon-wrap">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <polygon points="5,3 19,12 5,21"/>
          </svg>
        </span>
        @d1ncex
      </a>
      <div class="yt-stats">
        <div class="yt-stat"><span class="dot"></span> youtube channel</div>
        <div class="yt-stat">subscribe &amp; stay tuned</div>
      </div>
    </div>

  </div>

  <footer>© 2026 D1NCEX TWEAKS — ALL RIGHTS RESERVED</footer>

  <script>
    const cursor = document.getElementById('cursor');
    const ring = document.getElementById('cursorRing');
    const ytLink = document.getElementById('ytLink');
    let mx = 0, my = 0, rx = 0, ry = 0;

    document.addEventListener('mousemove', e => {
      mx = e.clientX; my = e.clientY;
      cursor.style.left = mx + 'px'; cursor.style.top = my + 'px';
    });
    (function animRing() {
      rx += (mx - rx) * 0.1; ry += (my - ry) * 0.1;
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      requestAnimationFrame(animRing);
    })();

    // Red cursor on YouTube hover
    ytLink.addEventListener('mouseenter', () => {
      ring.classList.add('hover', 'red');
      cursor.classList.add('red');
    });
    ytLink.addEventListener('mouseleave', () => {
      ring.classList.remove('hover', 'red');
      cursor.classList.remove('red');
    });

    document.querySelectorAll('.fp-item').forEach(el => {
      el.addEventListener('mouseenter', () => ring.classList.add('hover'));
      el.addEventListener('mouseleave', () => ring.classList.remove('hover'));
    });
  </script>
</body>
</html>
